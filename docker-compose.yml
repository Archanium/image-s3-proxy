version: '3.8'

services:
  # Main application service mirroring production environment (Alpine-based)
  app:
    build:
      context: .
      dockerfile: Dockerfile.alpine
    image: archanium/image-s3-proxy:alpine-latest
    environment:
      - BUCKET=${BUCKET:-my-bucket}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - OLD_S3_BUCKET=${OLD_S3_BUCKET:-}
      - OLD_S3_REGION=${OLD_S3_REGION:-us-east-1}
      - OLD_S3_ACCESS_KEY_ID=${OLD_S3_ACCESS_KEY_ID:-}
      - OLD_S3_SECRET_ACCESS_KEY=${OLD_S3_SECRET_ACCESS_KEY:-}
      - OLD_S3_ENDPOINT=${OLD_S3_ENDPOINT:-}
      - PORT=8080
      - IMAGE_TAGS=ManagedBy=ImageProxy,Environment=Production
    ports:
      - "8080:8080"
    restart: unless-stopped

  # Service for running tests in the build environment (Alpine with libvips-dev)
  tester:
    build:
      context: .
      dockerfile: Dockerfile.alpine
      target: builder
    volumes:
      - ./:/app/
    image: archanium/image-proxy-builder:alpine
    command: go test -v ./...
    environment:
      - BUCKET=test-bucket

  # Debian-based application service
  app-debian:
    build:
      context: .
      dockerfile: Dockerfile.debian
    image: archanium/image-s3-proxy:bookworm-latest
    environment:
      - BUCKET=${BUCKET:-my-bucket}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - OLD_S3_BUCKET=${OLD_S3_BUCKET:-}
      - OLD_S3_REGION=${OLD_S3_REGION:-us-east-1}
      - OLD_S3_ACCESS_KEY_ID=${OLD_S3_ACCESS_KEY_ID:-}
      - OLD_S3_SECRET_ACCESS_KEY=${OLD_S3_SECRET_ACCESS_KEY:-}
      - OLD_S3_ENDPOINT=${OLD_S3_ENDPOINT:-}
      - PORT=8080
      - IMAGE_TAGS=ManagedBy=ImageProxy,Environment=Production
    ports:
      - "8081:8080"
    restart: unless-stopped

  # Debian-based tester service
  tester-debian:
    build:
      context: .
      dockerfile: Dockerfile.debian
      target: builder
    volumes:
      - ./:/app/
    image: archanium/image-proxy-builder:debian
    command: go test -v ./...
    environment:
      - BUCKET=test-bucket
