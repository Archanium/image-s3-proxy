version: 2.1

jobs:
  test:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: Run Alpine tests
          command: docker-compose run --rm tester
      - run:
          name: Run Debian tests
          command: docker-compose run --rm tester-debian

  build-and-push:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: Set up Buildx
          command: |
            docker buildx create --use
            docker buildx inspect --bootstrap
      - run:
          name: Login to Docker Hub
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Build and push Alpine image
          command: |
            docker buildx build --platform linux/amd64,linux/arm64 \
              -t archanium/image-s3-proxy:alpine-latest \
              -f Dockerfile.alpine --push .
      - run:
          name: Build and push Debian image
          command: |
            docker buildx build --platform linux/amd64,linux/arm64 \
              -t archanium/image-s3-proxy:bookworm-latest \
              -f Dockerfile.debian --push .

workflows:
  version: 2
  build:
    jobs:
      - test
      - build-and-push:
          requires:
            - test
          context: docker_auth
          filters:
            branches:
              only:
                - main
